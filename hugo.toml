# ============================================
# Hugo Configuration — A Moment's Rest
# Single-file config, merged from:
#   config.toml, languages.toml, markup.toml,
#   menu.toml, params.toml, permalinks.toml, related.toml
# ============================================

# ============================================
# 1. Global Settings
# ============================================
baseurl = "https://a-moment096.github.io/"
title = "A Moment's Rest"
theme = "stack"

# Multilingual
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = true
hasCJKLanguage = true

# Change it to your Disqus shortname before using
disqusShortname = "hugo-theme-stack"

timeZone = "Etc/GMT-8"

[pagination]
pagerSize = 20

[frontmatter]
lastmod = ["lastmod", ":fileModTime"]

# ============================================
# 2. Permalinks (global fallback)
#    Page/section permalinks are per-language.
# ============================================
[permalinks]
posts = "/:sections/:contentbasename/"

# ============================================
# 3. Related Content
# ============================================
[related]
includeNewer = true
threshold = 60
toLower = false

[[related.indices]]
name = "tags"
weight = 100

[[related.indices]]
name = "categories"
weight = 200

# ============================================
# 4. Markup (Markdown rendering)
# ============================================
[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.parser.attribute]
block = true
title = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)'], ['$', '$']]

[markup.tableOfContents]
endLevel = 6
ordered = true
startLevel = 1

[markup.highlight]
noClasses = false
codeFences = true
guessSyntax = true
lineNoStart = 1
lineNos = true
lineNumbersInTable = false
tabWidth = 4

# ============================================
# 5. Languages
# ============================================

