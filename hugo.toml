# ============================================
# 6. Theme Parameters
# ============================================
[params]
mainSections = ["posts"]
rssFullContent = false
favicon = "/coffee.png"

# Footer
[params.footer]
since = 2024
customText = "<a href=\"https://icp.gov.moe/?keyword=20257072\" target=\"_blank\">萌ICP备20257072号</a>"

# Date format
[params.dateFormat]
published = "Jan 02, 2006"
lastUpdated = "Jan 02, 2006 15:04 MST"

# Sidebar (per-language subtitle set in [languages.xx.params.sidebar])
[params.sidebar]
emoji = "💦"

[params.sidebar.avatar]
enabled = true
local = true
src = "img/avatar.jpg"

# Article display
[params.article]
