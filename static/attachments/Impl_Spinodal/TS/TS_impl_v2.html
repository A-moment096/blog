<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spinodal Simulation (TS v2)</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      body {
        margin: 0;
        background: #f6f8fb;
        color: #222;
      }
      #app {
        max-width: 980px;
        margin: 0 auto;
        padding: 20px;
      }
      .panel {
        background: white;
        border: 1px solid #d7dce5;
        border-radius: 10px;
        padding: 16px;
      }
      .meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 1fr));
        gap: 8px;
        margin-bottom: 12px;
        font-size: 14px;
      }
      canvas {
        width: 100%;
        height: auto;
        image-rendering: pixelated;
        border: 1px solid #ccd3de;
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./TS_impl_v2.ts"></script>
  </body>
</html>
